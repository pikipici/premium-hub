services:
  postgres:
    image: postgres:16-alpine
    container_name: premiumhub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: premiumhub123
      POSTGRES_DB: premiumhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
